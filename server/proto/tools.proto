syntax = "proto3";

package agentic;

// ── Tool Service ────────────────────────────────────────────

service ToolService {
    // Execute a single tool and get result
    rpc ExecuteTool(ToolRequest) returns (ToolResponse);
    
    // List all available tools
    rpc ListTools(Empty) returns (ToolList);
    
    // Get tool metadata
    rpc GetToolInfo(ToolInfoRequest) returns (ToolInfo);
}

// ── Messages ────────────────────────────────────────────────

message Empty {}

message ToolRequest {
    string tool_name = 1;
    string arguments_json = 2;  // JSON-encoded arguments
    string workspace = 3;
}

message ToolResponse {
    string tool_name = 1;
    string status = 2;          // "completed" | "error"
    string result = 3;
    double execution_time_ms = 4;
}

message ToolList {
    repeated ToolInfo tools = 1;
}

message ToolInfoRequest {
    string tool_name = 1;
}

message ToolInfo {
    string name = 1;
    string description = 2;
    string category = 3;        // "file", "search", "code", "web", "lsp", "task"
    repeated ToolParam params = 4;
}

message ToolParam {
    string name = 1;
    string type = 2;
    string description = 3;
    bool required = 4;
}
