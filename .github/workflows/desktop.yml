name: Desktop Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub Release"
        type: boolean
        default: false

jobs:
  # ── Build frontend static export ────────────────────────────
  build-frontend:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build static export
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE: ""  # relative URLs for desktop

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  # ── Electron builds (matrix: win / mac / linux) ─────────────
  build-electron:
    name: Build Electron (${{ matrix.os }})
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package.json

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Build Electron app
        run: npm run dist:${{ matrix.platform }}
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional — omit if not configured)
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowdev-${{ matrix.platform }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.zip
            desktop/dist/latest*.yml
          retention-days: 7

  # ── Create GitHub Release ────────────────────────────────────
  release:
    name: Create Release
    needs: build-electron
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release == true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shadowdev-*
          merge-multiple: true
          path: release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ShadowDev ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
